
<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .header { background: #111; border-bottom: 1px solid #1e1e1e; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }

  .status-bar { background: #0d0d0d; border-bottom: 1px solid #1a1a1a; padding: 8px 20px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: #555; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; transition: background 0.3s; }
  .status-dot.active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .status-dot.searching { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

  .camera-area { position: relative; background: #060606; border-bottom: 1px solid #1a1a1a; overflow: hidden; height: 260px; display: flex; align-items: center; justify-content: center; }
  #videoEl { width: 100%; height: 100%; object-fit: cover; display: none; }
  #canvasEl { display: none; }

  .camera-placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .camera-icon { width: 56px; height: 56px; border: 1.5px solid #2a2a2a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #333; }
  .camera-hint { font-size: 11px; color: #333; letter-spacing: 1px; }

  .roi-box { position: absolute; border: 2px solid rgba(34,197,94,0.5); border-radius: 6px; pointer-events: none; transition: all 0.25s ease; display: none; }
  .roi-box.detecting { border-color: rgba(245,158,11,0.8); box-shadow: 0 0 16px rgba(245,158,11,0.25); }
  .roi-box.locked { border-color: rgba(34,197,94,0.9); box-shadow: 0 0 20px rgba(34,197,94,0.3); }
  .roi-box.green-active { border-color: #22c55e; box-shadow: 0 0 28px rgba(34,197,94,0.55); }
  .roi-label { position: absolute; top: -20px; left: 0; font-size: 9px; letter-spacing: 1px; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; color: rgba(34,197,94,0.8); }
  .roi-label.searching { color: rgba(245,158,11,0.8); }
  .corner { position: absolute; width: 10px; height: 10px; }
  .corner.tl { top:-2px;left:-2px;border-top:2px solid #22c55e;border-left:2px solid #22c55e;border-radius:2px 0 0 0; }
  .corner.tr { top:-2px;right:-2px;border-top:2px solid #22c55e;border-right:2px solid #22c55e;border-radius:0 2px 0 0; }
  .corner.bl { bottom:-2px;left:-2px;border-bottom:2px solid #22c55e;border-left:2px solid #22c55e;border-radius:0 0 0 2px; }
  .corner.br { bottom:-2px;right:-2px;border-bottom:2px solid #22c55e;border-right:2px solid #22c55e;border-radius:0 0 2px 0; }

  /* 방향 배지 */
  .orient-badge { position: absolute; top: 8px; right: 8px; font-size: 9px; font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; background: #111; border: 1px solid #2a2a2a; color: #555; display: none; }
  .orient-badge.h { border-color: #f59e0b44; color: #f59e0b; background: #f59e0b15; }

  .log-entry{display:flex;gap:8px} .log-time{color:#2a2a2a;flex-shrink:0}
  .log-msg.green{color:#16a34a} .log-msg.amber{color:#92400e} .log-msg.red{color:#7f1d1d} .log-msg.info{color:#1e3a5f}
  .note{font-size:10px;color:#2a2a2a;text-align:center;padding-bottom:4px}

<script>
let stream=null, animFrame=null, isRunning=false;
let alertCount=0, lastAlertTime=0;
let sensitivityThreshold=3, cooldownSec=5;
let currentCamera='back';
let consecutiveGreen=0, currentState='IDLE';
let audioCtx=null;

// 탐지 상태
const TS = {SEARCHING:'searching', CANDIDATE:'candidate', LOCKED:'locked'};
let trackState=TS.SEARCHING;
let roi=null, candidateRoi=null, candidateFrames=0, lostFrames=0, scanFrameCount=0;
let detectedOrientation=null; // 'h' or 'v'
let orientMode='auto'; // 'auto','h','v'

const video=document.getElementById('videoEl');
const canvas=document.getElementById('canvasEl');
const ctx=canvas.getContext('2d');
const cameraArea=document.getElementById('cameraArea');
const roiBox=document.getElementById('roiBox');
const roiLabel=document.getElementById('roiLabel');
const greenFlash=document.getElementById('greenFlash');
const orientBadge=document.getElementById('orientBadge');

function getTime(){const d=new Date();return[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>n.toString().padStart(2,'0')).join(':');}
function addLog(msg,type='info'){
  const log=document.getElementById('logArea');
  const e=document.createElement('div');
  e.className='log-entry';
  e.innerHTML=`<span class="log-time">${getTime()}</span><span class="log-msg ${type}">${msg}</span>`;
  log.appendChild(e); log.scrollTop=log.scrollHeight;
  if(log.children.length>25) log.removeChild(log.firstChild);
}
function setStatus(text,mode='idle'){
  document.getElementById('statusText').textContent=text;
  const dot=document.getElementById('statusDot');
  dot.className='status-dot'+(mode==='active'?' active':mode==='searching'?' searching':'');
}
function setOrientMode(m){
  orientMode=m;
  ['btnAuto','btnH','btnV'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(m==='auto'?'btnAuto':m==='h'?'btnH':'btnV').classList.add('active');
  resetTracking();
  addLog(`배열 방식: ${m==='auto'?'자동 감지':m==='h'?'가로 (한국)':'세로'}`, 'info');
}

// ─── 핵심: 가로/세로 신호등 탐지 ──────────────────────────────────────
function detectTrafficLight(imageData, cw, ch) {
  const data=imageData.data;
  const GRID=24;
  const cellW=cw/GRID, cellH=ch/GRID;

  const rScore=new Float32Array(GRID*GRID);
  const gScore=new Float32Array(GRID*GRID);
  const yScore=new Float32Array(GRID*GRID); // 노랑도 보조로 사용

  for(let py=0;py<ch;py+=2){ // 2픽셀씩 건너뛰어 속도 향상
    for(let px=0;px<cw;px+=2){
      const idx=(py*cw+px)*4;
      const r=data[idx],g=data[idx+1],b=data[idx+2];
      const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
      if(mx<45) continue;
      const s=(mx-mn)/mx;
      if(s<0.32) continue;
      let h=0;
      if(mx!==mn){
        if(mx===r) h=((g-b)/(mx-mn)*60+360)%360;
        else if(mx===g) h=(b-r)/(mx-mn)*60+120;
        else h=(r-g)/(mx-mn)*60+240;
      }
      const cx2=Math.floor(px/cellW), cy2=Math.floor(py/cellH);
      if(cx2<0||cx2>=GRID||cy2<0||cy2>=GRID) continue;
      const ci=cy2*GRID+cx2;
      if((h<=22||h>=338)&&mx>80) rScore[ci]+=1;        // 빨강
      if(h>=85&&h<=165&&mx>50)   gScore[ci]+=1;        // 초록
      if(h>=35&&h<=70&&mx>80&&s>0.5) yScore[ci]+=1;   // 노랑
    }
  }

  let bestH=null, bestV=null;
  const checkModes=[];
  if(orientMode==='auto'||orientMode==='h') checkModes.push('h');
  if(orientMode==='auto'||orientMode==='v') checkModes.push('v');

  for(const mode of checkModes){
    if(mode==='h'){
      // 가로 탐지: 같은 행에서 빨강(왼쪽)과 초록(오른쪽)이 배열
      for(let ry=1;ry<GRID-1;ry++){
        for(let rcx=0;rcx<GRID-3;rcx++){
          const rS=rScore[ry*GRID+rcx];
          if(rS<6) continue;
          // 초록은 2~5칸 오른쪽
          for(let gcx=rcx+2;gcx<=Math.min(rcx+6,GRID-1);gcx++){
            const gS=gScore[ry*GRID+gcx];
            if(gS<5) continue;
            const score=rS+gS*1.5;
            if(!bestH||score>bestH.score){
              const pad=1;
              bestH={
                x:Math.floor(Math.max(0,rcx-pad)*cellW),
                y:Math.floor(Math.max(0,ry-pad)*cellH),
                w:Math.floor((gcx-rcx+1+pad*2)*cellW),
                h:Math.floor((1+pad*2)*cellH),
                score, orient:'h'
              };
            }
          }
        }
      }
    } else {
      // 세로 탐지: 같은 열에서 빨강(위)과 초록(아래)
      for(let rcx=1;rcx<GRID-1;rcx++){
        for(let rcy=0;rcy<GRID-3;rcy++){
          const rS=rScore[rcy*GRID+rcx];
          if(rS<6) continue;
          for(let gcy=rcy+2;gcy<=Math.min(rcy+6,GRID-1);gcy++){
            const gS=gScore[gcy*GRID+rcx];
            if(gS<5) continue;
            const score=rS+gS*1.5;
            if(!bestV||score>bestV.score){
              const pad=1;
              bestV={
                x:Math.floor(Math.max(0,rcx-pad)*cellW),
                y:Math.floor(Math.max(0,rcy-pad)*cellH),
                w:Math.floor((1+pad*2)*cellW),
                h:Math.floor((gcy-rcy+1+pad*2)*cellH),
                score, orient:'v'
              };
            }
          }
        }
      }
    }
  }

  // 더 높은 점수의 결과 반환
  if(bestH&&bestV) return bestH.score>=bestV.score?bestH:bestV;
  return bestH||bestV||null;
}

function roiToScreen(r){
  if(!r) return null;
  const ar=cameraArea.getBoundingClientRect();
  return { x:r.x*(ar.width/canvas.width), y:r.y*(ar.height/canvas.height), w:r.w*(ar.width/canvas.width), h:r.h*(ar.height/canvas.height) };
}

function updateRoiBox(sr, state, orient){
  if(!sr){roiBox.style.display='none';return;}
  roiBox.style.display='block';
  roiBox.style.left=sr.x+'px'; roiBox.style.top=sr.y+'px';
  roiBox.style.width=sr.w+'px'; roiBox.style.height=sr.h+'px';
  roiBox.className='roi-box';
  roiLabel.className='roi-label';
  if(state===TS.CANDIDATE){roiBox.classList.add('detecting');roiLabel.classList.add('searching');roiLabel.textContent='확인 중...';}
  else if(state===TS.LOCKED){
    roiBox.classList.add('locked');
    roiLabel.textContent=(orient==='h'?'🔴🟡🟢 가로':'세로')+' 감지 ZONE ✓';
  }
  // 방향 배지
  orientBadge.style.display='block';
  orientBadge.className='orient-badge '+(orient||'');
  orientBadge.textContent=orient==='h'?'가로 배열 (KR)':orient==='v'?'세로 배열':'--';
}

function updateDetectStatus(state, extra){
  const card=document.getElementById('detectStatusCard');
  const icon=document.getElementById('detectIcon');
  card.style.display='flex';
  const title=document.getElementById('detectTitle');
  const sub=document.getElementById('detectSub');
  if(state===TS.SEARCHING){
    icon.className='detect-icon searching';icon.textContent='🔍';
    title.textContent='신호등 탐색 중...';sub.textContent='카메라를 신호등 방향으로 향해주세요';
    setStatus('탐색 중 — 신호등을 찾고 있습니다','searching');
  } else if(state===TS.CANDIDATE){
    icon.className='detect-icon searching';icon.textContent='🎯';
    title.textContent='신호등 후보 발견 — 확인 중';sub.textContent=`확인 ${extra||0}/8 프레임`;
    setStatus('후보 확인 중...','searching');
  } else if(state===TS.LOCKED){
    icon.className='detect-icon found';icon.textContent='✅';
    const oLabel=detectedOrientation==='h'?'가로 배열 (한국형)':'세로 배열';
    title.textContent=`신호등 고정 — ${oLabel}`;sub.textContent='녹색 전환 감지 대기 중';
    setStatus('감지 중 — 신호등 추적 완료','active');
  }
}

function resetTracking(){
  trackState=TS.SEARCHING; roi=null; candidateRoi=null;
  candidateFrames=0; lostFrames=0; detectedOrientation=null;
  roiBox.className='roi-box'; roiBox.style.display='none';
  orientBadge.style.display='none';
  updateDetectStatus(TS.SEARCHING);
  document.getElementById('scanLineV').style.display='block';
  document.getElementById('scanLineH').style.display='block';
  addLog('신호등 재탐지 시작','amber');
  document.getElementById('metricState').textContent='탐색';
  document.getElementById('metricState').className='metric-val amber';
}

function isSimilarRoi(a,b){
  if(!a||!b) return false;
  const cx1=a.x+a.w/2,cy1=a.y+a.h/2,cx2=b.x+b.w/2,cy2=b.y+b.h/2;
  const mx=Math.max(canvas.width,canvas.height);
  return Math.abs(cx1-cx2)/mx<0.28&&Math.abs(cy1-cy2)/mx<0.28;
}
function smoothRoi(o,n,a){return{x:o.x*(1-a)+n.x*a,y:o.y*(1-a)+n.y*a,w:o.w*(1-a)+n.w*a,h:o.h*(1-a)+n.h*a,score:n.score,orient:n.orient};}

// ─── 메인 루프 ─────────────────────────────────────────────────────────
function detectLoop(){
  if(!isRunning) return;
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const fullImg=ctx.getImageData(0,0,canvas.width,canvas.height);
  scanFrameCount++;

  const shouldScan=trackState!==TS.LOCKED?(scanFrameCount%4===0):(scanFrameCount%30===0);

  if(shouldScan){
    const found=detectTrafficLight(fullImg,canvas.width,canvas.height);

    if(trackState===TS.SEARCHING){
      if(found){candidateRoi=found;candidateFrames=1;trackState=TS.CANDIDATE;updateDetectStatus(TS.CANDIDATE,1);updateRoiBox(roiToScreen(found),TS.CANDIDATE,found.orient);}
    } else if(trackState===TS.CANDIDATE){
      if(found&&isSimilarRoi(found,candidateRoi)){
        candidateFrames++;
        candidateRoi=smoothRoi(candidateRoi,found,0.4);
        updateDetectStatus(TS.CANDIDATE,candidateFrames);
        updateRoiBox(roiToScreen(candidateRoi),TS.CANDIDATE,found.orient);
        if(candidateFrames>=8){
          roi=candidateRoi; detectedOrientation=roi.orient;
          trackState=TS.LOCKED; lostFrames=0;
          document.getElementById('scanLineV').style.display='none';
          document.getElementById('scanLineH').style.display='none';
          updateDetectStatus(TS.LOCKED);
          updateRoiBox(roiToScreen(roi),TS.LOCKED,detectedOrientation);
          addLog(`신호등 고정! ${detectedOrientation==='h'?'가로(한국형)':'세로'} 배열 감지.`,'green');
        }
      } else {candidateFrames=0;candidateRoi=null;trackState=TS.SEARCHING;updateDetectStatus(TS.SEARCHING);updateRoiBox(null);}
    } else if(trackState===TS.LOCKED){
      if(found&&isSimilarRoi(found,roi)){roi=smoothRoi(roi,found,0.1);lostFrames=0;updateRoiBox(roiToScreen(roi),TS.LOCKED,detectedOrientation);}
      else{lostFrames++;if(lostFrames>60){addLog('신호등 놓침 — 재탐지','amber');resetTracking();}}
    }
  }

  // 녹색 감지
  let greenPct=0;
  if(trackState===TS.LOCKED&&roi){
    const rx=Math.max(0,Math.floor(roi.x)), ry=Math.max(0,Math.floor(roi.y));
    const rw=Math.min(Math.floor(roi.w),canvas.width-rx), rh=Math.min(Math.floor(roi.h),canvas.height-ry);

    if(rw>4&&rh>4){
      let gx=rx,gy=ry,gw=rw,gh=rh;
      // 가로 배열: 오른쪽 1/3에서 초록 감지
      if(detectedOrientation==='h'){gx=rx+Math.floor(rw*0.6);gw=Math.floor(rw*0.4);}
      // 세로 배열: 하단 1/2에서 초록 감지
      else{gy=ry+Math.floor(rh*0.5);gh=Math.floor(rh*0.5);}

      if(gw>2&&gh>2){
        const rd=ctx.getImageData(gx,gy,gw,gh);
        const d2=rd.data;
        let gc=0,total=0;
        for(let i=0;i<d2.length;i+=4){
          const r2=d2[i],g2=d2[i+1],b2=d2[i+2];
          const mx=Math.max(r2,g2,b2),mn=Math.min(r2,g2,b2);
          total++;
          if(mx<40) continue;
          const s2=(mx-mn)/mx;
          let h2=0;
          if(mx!==mn){if(mx===r2)h2=((g2-b2)/(mx-mn)*60+360)%360;else if(mx===g2)h2=(b2-r2)/(mx-mn)*60+120;else h2=(r2-g2)/(mx-mn)*60+240;}
          if(h2>=85&&h2<=165&&s2>0.3&&mx>50) gc++;
        }
        greenPct=total>0?gc/total*100:0;
      }
    }

    document.getElementById('metricGreenPct').textContent=Math.round(greenPct)+'%';
    const isGreen=greenPct>=sensitivityThreshold;
    if(isGreen){consecutiveGreen++;roiBox.classList.add('green-active');}
    else{consecutiveGreen=0;roiBox.classList.remove('green-active');}

    const now=Date.now();
    if(consecutiveGreen>=4&&currentState!=='GREEN'){
      currentState='GREEN'; updateSignalState('녹색',true);
      if(now-lastAlertTime>cooldownSec*1000){triggerAlert();lastAlertTime=now;}
    } else if(!isGreen&&consecutiveGreen===0&&currentState==='GREEN'){
      currentState='RED'; updateSignalState('적색',false);
    }
  } else {
    document.getElementById('metricGreenPct').textContent='--';
  }

  animFrame=requestAnimationFrame(detectLoop);
}

function updateSignalState(label,isGreen){
  const el=document.getElementById('metricState');
  el.textContent=label;
  el.className='metric-val'+(isGreen?' green':label==='대기'?'':' red');
}
function triggerAlert(){
  alertCount++;
  document.getElementById('metricAlerts').textContent=alertCount;
  document.getElementById('alertTime').textContent=getTime().slice(0,5);
  document.getElementById('alertBanner').classList.add('show');
  setTimeout(()=>document.getElementById('alertBanner').classList.remove('show'),4000);
  greenFlash.classList.add('on'); setTimeout(()=>greenFlash.classList.remove('on'),300);
  addLog('✓ 녹색 신호 감지 — 알림!','green');
  playBeep(); vibrate();
}
function playBeep(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator(),gain=audioCtx.createGain();
    o1.type='sine';o1.frequency.value=880; o2.type='sine';o2.frequency.value=1100;
    gain.gain.setValueAtTime(0.4,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
    o1.connect(gain);o2.connect(gain);gain.connect(audioCtx.destination);
    o1.start();o1.stop(audioCtx.currentTime+0.15);
    o2.start(audioCtx.currentTime+0.15);o2.stop(audioCtx.currentTime+0.5);
  }catch(e){}
}
function vibrate(){if('vibrate'in navigator)navigator.vibrate([200,80,200,80,400]);}

async function toggleDetection(){if(!isRunning) await startDetection(); else stopDetection();}
async function startDetection(){
  try{
    const facing=currentCamera==='back'?'environment':'user';
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:640},height:{ideal:480}}});
    video.srcObject=stream; video.style.display='block';
    document.getElementById('camPlaceholder').style.display='none';
    document.getElementById('cameraButtons').style.display='flex';
    document.getElementById('orientRow').style.display='block';
    document.getElementById('detectStatusCard').style.display='flex';
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    video.onloadedmetadata=()=>{
      canvas.width=video.videoWidth; canvas.height=video.videoHeight;
      isRunning=true;
      document.getElementById('btnStart').textContent='⏹ 감지 중지';
      document.getElementById('btnStart').classList.add('running');
      resetTracking();
      addLog('카메라 시작. 가로/세로 신호등 자동 탐지 활성화.','info');
      detectLoop();
    };
  }catch(e){addLog('카메라 실패: '+e.message,'red');alert('카메라 권한을 허용해주세요.');}
}
function stopDetection(){
  isRunning=false;
  if(animFrame) cancelAnimationFrame(animFrame);
  if(stream) stream.getTracks().forEach(t=>t.stop());
  video.style.display='none';
  document.getElementById('camPlaceholder').style.display='flex';
  ['cameraButtons','orientRow','detectStatusCard'].forEach(id=>document.getElementById(id).style.display='none');
  roiBox.style.display='none'; orientBadge.style.display='none';
  document.getElementById('scanLineV').style.display='none';
  document.getElementById('scanLineH').style.display='none';
  document.getElementById('btnStart').textContent='▶ 감지 시작';
  document.getElementById('btnStart').classList.remove('running');
  currentState='IDLE'; setStatus('중지됨');
  addLog('감지 중지됨.','info');
}
async function switchCamera(facing){
  currentCamera=facing;
  document.getElementById('btnFront').classList.toggle('active',facing==='front');
  document.getElementById('btnBack').classList.toggle('active',facing==='back');
  if(!isRunning) return;
  if(stream) stream.getTracks().forEach(t=>t.stop());
  if(animFrame) cancelAnimationFrame(animFrame);
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing==='back'?'environment':'user',width:{ideal:640},height:{ideal:480}}});
    video.srcObject=stream;
    video.onloadedmetadata=()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;resetTracking();detectLoop();};
    addLog((facing==='back'?'후면':'전면')+' 카메라 전환','info');
  }catch(e){addLog('전환 실패','red');}
}
</script>
